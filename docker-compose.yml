services:
  postgres:
    image: postgres:16-alpine
    container_name: lioconecta-postgres
    environment:
      POSTGRES_DB: lioconecta
      POSTGRES_USER: lioconecta
      POSTGRES_PASSWORD: lioconecta_dev
    ports:
      - "5432:5432"
    volumes:
      - lioconecta_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lioconecta -d lioconecta"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lioconecta-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  lioconecta_pgdata:
